<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#e2e2e2",
                        "on-surface-variant": "#474747",
                        "secondary-fixed-dim": "#acabab",
                        "on-error-container": "#410002",
                        "error": "#ba1a1a",
                        "inverse-primary": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary": "#e2e2e2",
                        "secondary-fixed": "#c7c6c6",
                        "surface-dim": "#dadada",
                        "on-tertiary-fixed-variant": "#e3e2e2",
                        "on-tertiary-fixed": "#ffffff",
                        "primary-fixed": "#5e5e5e",
                        "tertiary-fixed-dim": "#464747",
                        "secondary-container": "#d5d4d4",
                        "on-secondary-fixed": "#1b1c1c",
                        "surface-container": "#eeeeee",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#ffffff",
                        "surface": "#f9f9f9",
                        "outline": "#777777",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-variant": "#e2e2e2",
                        "on-tertiary-container": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-high": "#e8e8e8",
                        "background": "#f9f9f9",
                        "on-secondary-container": "#1b1c1c",
                        "surface-tint": "#5e5e5e",
                        "surface-container-highest": "#e2e2e2",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "on-surface": "#1a1c1c",
                        "inverse-surface": "#2f3131",
                        "tertiary-container": "#747575",
                        "secondary": "#5e5e5e",
                        "tertiary-fixed": "#5d5e5f",
                        "tertiary": "#3a3c3c",
                        "primary-fixed-dim": "#474747",
                        "outline-variant": "#c6c6c6",
                        "on-secondary-fixed-variant": "#3b3b3c",
                        "on-primary-fixed": "#ffffff",
                        "primary": "#000000",
                        "on-tertiary": "#e3e2e2",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#3b3b3b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="flex items-center w-full px-4 h-16 bg-slate-50 dark:bg-slate-900 sticky top-0 z-40">
<div class="flex items-center gap-4">
<button class="p-2 transition-colors duration-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
<span class="material-symbols-outlined text-black dark:text-white" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-bold text-xl tracking-tight text-black dark:text-white">Nueva Reserva</h1>
</div>
</header>
<div class="bg-slate-200 dark:bg-slate-800 h-[1px] w-full"></div>
<main class="max-w-md mx-auto px-6 py-8">
<!-- Hero Contextual Label -->
<div class="mb-8">
<span class="font-label text-[0.6875rem] uppercase tracking-widest text-secondary font-semibold">Proceso de Reserva</span>
<h2 class="font-headline text-2xl font-bold mt-1 tracking-tight">Seleccione los detalles</h2>
</div>
<form class="space-y-10">
<!-- Selector de Recurso -->
<section>
<label class="font-label text-[0.6875rem] uppercase tracking-widest text-secondary mb-4 block">1. Recurso</label>
<div class="grid grid-cols-2 gap-3">
<button class="group flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border-2 border-primary rounded-xl p-4 transition-transform active:scale-95" type="button">
<span class="material-symbols-outlined text-3xl mb-2" data-icon="pool">pool</span>
<span class="text-sm font-bold">Pileta</span>
</button>
<button class="group flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant rounded-xl p-4 transition-transform active:scale-95 hover:bg-surface-container-low" type="button">
<span class="material-symbols-outlined text-3xl mb-2" data-icon="sports_tennis">sports_tennis</span>
<span class="text-sm font-medium">Cancha</span>
</button>
<button class="group flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant rounded-xl p-4 transition-transform active:scale-95 hover:bg-surface-container-low" type="button">
<span class="material-symbols-outlined text-3xl mb-2" data-icon="outdoor_grill">outdoor_grill</span>
<span class="text-sm font-medium">Quincho</span>
</button>
<button class="group flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant rounded-xl p-4 transition-transform active:scale-95 hover:bg-surface-container-low" type="button">
<span class="material-symbols-outlined text-3xl mb-2" data-icon="meeting_room">meeting_room</span>
<span class="text-sm font-medium">SUM</span>
</button>
</div>
</section>
<!-- Selector de Fecha -->
<section>
<label class="font-label text-[0.6875rem] uppercase tracking-widest text-secondary mb-4 block">2. Fecha</label>
<div class="relative group">
<div class="absolute left-0 bottom-0 w-full h-[1px] bg-outline group-focus-within:h-[2px] group-focus-within:bg-primary transition-all"></div>
<div class="flex items-center gap-3 pb-3">
<span class="material-symbols-outlined text-outline" data-icon="calendar_today">calendar_today</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-lg font-medium placeholder:text-outline-variant" placeholder="Seleccione fecha" type="text" value="Sábado, 24 de Octubre"/>
</div>
</div>
</section>
<!-- Selector de Horario -->
<section>
<label class="font-label text-[0.6875rem] uppercase tracking-widest text-secondary mb-4 block">3. Horario</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-outline-variant text-sm font-medium hover:bg-surface-container-highest transition-colors" type="button">09:00</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-sm font-medium hover:bg-surface-container-highest transition-colors" type="button">11:00</button>
<button class="px-4 py-2 rounded-full bg-primary text-on-primary text-sm font-bold shadow-md" type="button">13:00</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-sm font-medium hover:bg-surface-container-highest transition-colors" type="button">15:00</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-sm font-medium hover:bg-surface-container-highest transition-colors" type="button">17:00</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-sm font-medium hover:bg-surface-container-highest transition-colors" type="button">19:00</button>
</div>
</section>
<!-- Tonal Slab for Additional Info -->
<div class="bg-surface-container-high p-4 rounded-xl flex items-start gap-3">
<span class="material-symbols-outlined text-secondary" data-icon="info">info</span>
<p class="text-xs text-on-surface-variant leading-relaxed">Las cancelaciones deben realizarse con al menos 24 horas de antelación para evitar penalizaciones en el sistema del barrio.</p>
</div>
<!-- Botón Guardar -->
<div class="pt-4">
<button class="w-full bg-primary py-5 rounded-xl text-on-primary font-bold text-lg tracking-tight shadow-lg transition-transform active:scale-[0.98] bg-gradient-to-b from-primary to-primary-container" type="submit">
                    Guardar
                </button>
</div>
</form>
</main>
<!-- BottomNavBar (Suppressed for transactional focus) -->
<!-- Navigation is suppressed per "Transactional" rule as this is a Task-Focused screen with a "Back" button -->
</body></html>
