<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neighborhood Pro - Acceso</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-surface-variant": "#474747",
                "on-primary-fixed-variant": "#e2e2e2",
                "on-tertiary": "#e3e2e2",
                "primary-fixed": "#5e5e5e",
                "on-tertiary-fixed": "#ffffff",
                "on-error": "#ffffff",
                "surface-bright": "#f9f9f9",
                "on-secondary": "#ffffff",
                "secondary-container": "#d5d4d4",
                "on-tertiary-container": "#ffffff",
                "surface-container-highest": "#e2e2e2",
                "on-secondary-fixed-variant": "#3b3b3c",
                "surface": "#f9f9f9",
                "on-secondary-container": "#1b1c1c",
                "on-background": "#1a1c1c",
                "on-primary-fixed": "#ffffff",
                "surface-container-low": "#f3f3f3",
                "tertiary-container": "#747575",
                "on-tertiary-fixed-variant": "#e3e2e2",
                "on-surface": "#1a1c1c",
                "tertiary": "#3a3c3c",
                "on-primary-container": "#ffffff",
                "primary-container": "#3b3b3b",
                "surface-container-high": "#e8e8e8",
                "primary-fixed-dim": "#474747",
                "tertiary-fixed-dim": "#464747",
                "surface-variant": "#e2e2e2",
                "inverse-primary": "#c6c6c6",
                "primary": "#000000",
                "error": "#ba1a1a",
                "error-container": "#ffdad6",
                "secondary-fixed-dim": "#acabab",
                "outline-variant": "#c6c6c6",
                "tertiary-fixed": "#5d5e5f",
                "surface-container-lowest": "#ffffff",
                "inverse-on-surface": "#f1f1f1",
                "surface-dim": "#dadada",
                "surface-container": "#eeeeee",
                "surface-tint": "#5e5e5e",
                "background": "#f9f9f9",
                "on-primary": "#e2e2e2",
                "on-secondary-fixed": "#1b1c1c",
                "inverse-surface": "#2f3131",
                "secondary-fixed": "#c7c6c6",
                "on-error-container": "#410002",
                "secondary": "#5e5e5e",
                "outline": "#777777"
            },
            "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
            },
            "fontFamily": {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Architectural Skeletalism: No borders, use tonal shifts */
      .input-wireframe {
        border: none;
        border-bottom: 1px solid #777777;
        background: transparent;
        border-radius: 0;
      }
      .input-wireframe:focus {
        outline: none;
        border-bottom: 2px solid #000000;
        ring: 0;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar - Shell Navigation (Hidden logic applies as this is a focused Login screen) -->
<!-- The prompt implies a Focused Journey, so TopAppBar and BottomNavBar from JSON are suppressed 
         per "Shell Visibility & Relevance (THE FILTER)" rules for transactional screens. -->
<main class="flex-grow flex flex-col items-center justify-center px-8 py-12">
<!-- Architectural Anchor: Branding & Logo Placeholder -->
<div class="mb-16 flex flex-col items-center gap-4">
<div class="w-24 h-24 bg-surface-container-high flex items-center justify-center rounded-xl">
<span class="material-symbols-outlined text-4xl text-secondary" data-icon="apartment">apartment</span>
</div>
<div class="text-center">
<span class="block text-[10px] font-bold tracking-[0.2em] uppercase text-outline mb-1">Mendoza, Argentina</span>
<h1 class="text-display-sm font-black tracking-tighter text-primary leading-none">Gestión de Barrios</h1>
</div>
</div>
<!-- Layout: Vertical Content Slab -->
<div class="w-full max-w-sm space-y-10">
<div class="space-y-8">
<!-- Field: Email o Usuario -->
<div class="relative">
<label class="block text-[11px] font-bold uppercase tracking-wider text-outline mb-2" for="email">Email o Usuario</label>
<input class="input-wireframe w-full py-3 text-body-md text-on-surface-variant placeholder:text-outline/40" id="email" placeholder="usuario@barrio.com" type="text"/>
</div>
<!-- Field: Contraseña -->
<div class="relative">
<label class="block text-[11px] font-bold uppercase tracking-wider text-outline mb-2" for="password">Contraseña</label>
<input class="input-wireframe w-full py-3 text-body-md text-on-surface-variant placeholder:text-outline/40" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary font-bold rounded-lg transition-transform active:scale-95 flex items-center justify-center gap-2 group">
<span class="text-sm tracking-widest uppercase">Ingresar</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Metadata/Links -->
<div class="flex flex-col items-center gap-6 pt-4">
<a class="text-xs font-medium text-secondary underline decoration-outline-variant underline-offset-4 hover:text-primary transition-colors" href="#">¿Olvidó sus credenciales?</a>
<div class="flex items-center gap-4 w-full">
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
<span class="text-[10px] uppercase tracking-widest text-outline">v1.0.4 - Privado</span>
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
</div>
</div>
</div>
</main>
<!-- Structural Footer / Background Elements -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<!-- Subtle architectural texture -->
<div class="absolute top-0 right-0 w-1/2 h-screen bg-surface-container-low opacity-40 -skew-x-12 translate-x-1/4"></div>
<div class="absolute bottom-10 left-10 text-[120px] font-black text-surface-container-high select-none opacity-20 rotate-90 origin-left">
            MENDOZA
        </div>
</div>
<!-- Background Image Fragment for atmosphere -->
<div class="fixed top-0 left-0 w-full h-1 bg-primary"></div>
<div class="hidden">
<!-- Placeholders for visual depth in high-end UI -->
<div class="w-full h-64 bg-surface-variant" data-alt="minimalist architectural sketch of a gated community entrance in Mendoza with dry mountain landscape background in grayscale"></div>
</div>
</body></html>
